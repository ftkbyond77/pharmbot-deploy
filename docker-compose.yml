services:

  # ── FastAPI backend ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      LITELLM_DROP_PARAMS: "True"
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./data/guidelines:/data/guidelines:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Qdrant vector store ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data: