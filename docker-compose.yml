services:

  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      LITELLM_DROP_PARAMS: "True"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ./data/guidelines:/data/guidelines:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    depends_on:
      - qdrant
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://34.87.101.105:8000/api/v1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped